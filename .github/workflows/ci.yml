name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev --locked

      - name: Ruff check
        run: uv run ruff check .

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev --locked

      - name: Run tests
        run: uv run python -m pytest

  package:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Install built wheel in isolated venv
        run: |
          uv venv .package-venv
          uv pip install --python .package-venv/bin/python dist/*.whl

      - name: Smoke test installed CLI
        run: |
          .package-venv/bin/holded-tt --version
          .package-venv/bin/holded-tt --help
          .package-venv/bin/holded-tt track --help

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev --locked

      - name: Run tests with coverage
        run: uv run python -m pytest --junitxml=pytest.xml --cov=holded_tt_cli --cov-report=term-missing --cov-report=markdown:coverage.md

      - name: Write coverage and test summary
        if: always()
        shell: bash
        run: |
          uv run python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("pytest.xml")
          coverage_path = Path("coverage.md")

          with summary_path.open("a", encoding="utf-8") as fh:
              fh.write("## Test summary\n\n")
              if report_path.exists():
                  root = ET.parse(report_path).getroot()
                  suites = [root] if root.tag == "testsuite" else root.findall(".//testsuite")
                  tests = sum(int(float(suite.attrib.get("tests", 0))) for suite in suites)
                  failures = sum(int(float(suite.attrib.get("failures", 0))) for suite in suites)
                  errors = sum(int(float(suite.attrib.get("errors", 0))) for suite in suites)
                  skipped = sum(int(float(suite.attrib.get("skipped", 0))) for suite in suites)
                  passed = tests - failures - errors - skipped

                  fh.write(f"- ✅ Passed: **{passed}**\n")
                  fh.write(f"- ❌ Failed: **{failures}**\n")
                  fh.write(f"- 🚨 Errors: **{errors}**\n")
                  fh.write(f"- ⏭️ Skipped: **{skipped}**\n")
                  fh.write(f"- 🧪 Total: **{tests}**\n")
              else:
                  fh.write("❌ No `pytest.xml` report was generated.\n")

              fh.write("\n## Coverage summary\n\n")
              if coverage_path.exists():
                  fh.write(coverage_path.read_text(encoding="utf-8"))
              else:
                  fh.write("❌ No coverage report was generated.\n")
          PY

  summary:
    name: Workflow summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - test
      - package
      - coverage
    steps:
      - name: Write workflow summary
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⏭️" ;;
              *) echo "❔" ;;
            esac
          }

          {
            echo "## CI summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint | $(status_icon "$LINT_RESULT") $LINT_RESULT |"
            echo "| Test matrix | $(status_icon "$TEST_RESULT") $TEST_RESULT |"
            echo "| Package smoke test | $(status_icon "$PACKAGE_RESULT") $PACKAGE_RESULT |"
            echo "| Coverage | $(status_icon "$COVERAGE_RESULT") $COVERAGE_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"
